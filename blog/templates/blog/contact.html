{% extends 'base.html' %}
{% load static %}
{% load blog_tags %}
{% load bootstrap4 %}
{% block content %}

{% include 'navbar.html' %}

 <div class="container">

<div class="row mt-lg-6 justify-content-center">
    
    <div class="col-lg-6 pl-lg-4 mt-lg-0 mt-6 contact" id="message-me">
        <h2>Interested to work together? <span>Let's talk</span></h2>

        <form method="POST">
                   <fieldset>
                  {% csrf_token %}
                  {% bootstrap_form form %}
                  {% buttons %}
                      <div class="col-md-12 col-lg-12 col-sm-12 col-xs-12 text-center">
                          <button class="get_bg_btn" type="submit">Send your message</button>
                        
                     </div>
                  {% endbuttons %}
                </fieldset>
                </form>

      
    </div>
</div>

</div>
{% endblock %}
